ai_usage_summary: |
  Used Claude to design, implement, and refine the candidate ranking, filtering, and scoring logic, as well as to update the tests.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We implement a multi-stage candidate discovery system:
  1. Lexical (BM25) and Semantic (SentenceTransformers) Hybrid Retrieval to produce the top candidate pool.
  2. LightGBM LambdaRank model trained across 5 recruiter persona targets.
  3. Transformer-based CrossEncoder reranker.
  4. A final Multi-Factor Adjusted Scoring step that enforces strict experience limits (5-9 YoE), technical role checks to filter out non-relevant careers, notice period constraints, and honeypot/trap penalization.

